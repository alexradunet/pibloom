<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bloom</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    background: #0d1117;
    color: #c9d1d9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container { max-width: 480px; padding: 2rem; }
  h1 { color: #58a6ff; font-size: 1.8rem; margin-bottom: 0.5rem; }
  .subtitle { color: #8b949e; margin-bottom: 2rem; }
  .services { list-style: none; }
  .services li {
    margin-bottom: 0.75rem;
    padding: 0.75rem 1rem;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
  }
  .services a {
    color: #58a6ff;
    text-decoration: none;
    font-weight: 600;
  }
  .services a:hover { text-decoration: underline; }
  .services .desc { color: #8b949e; font-size: 0.85rem; margin-top: 0.25rem; }
  footer { margin-top: 2rem; color: #484f58; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Bloom</h1>
  <p class="subtitle">Pi-native AI companion OS</p>
  <ul class="services">
    <li>
      <a href="http://files.pibloom.netbird.cloud">files.pibloom.netbird.cloud</a>
      <div class="desc">WebDAV file server (dufs)</div>
    </li>
    <li>
      <a href="http://llm.pibloom.netbird.cloud">llm.pibloom.netbird.cloud</a>
      <div class="desc">LLM API — OpenAI-compatible (llama.cpp)</div>
    </li>
    <li>
      <a href="http://stt.pibloom.netbird.cloud">stt.pibloom.netbird.cloud</a>
      <div class="desc">Speech-to-text API — OpenAI-compatible (whisper.cpp)</div>
    </li>
  </ul>
  <footer>Served by nginx on pibloom</footer>
</div>
</body>
</html>
