# bloom-settings.conf — Calamares sequence for Bloom OS installer
---
modules-search: [ local, /run/current-system/lib/calamares/modules ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - users
    - bloom-git
    - bloom-matrix
    - bloom-netbird
    - bloom-services
    - partition
    - summary
  - exec:
    - partition
    - mount
    - bloom-nixos
    - users
    - bloom-prefill
    - umount
  - show:
    - finished

branding: nixi
prompt-install: false
dont-chroot: false
